name: build-test-deploy
run-name: Test, Build and Deploy to Github Pages
on:
  push:
    branches:
      - master
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The @pandacss/eslint-plugin (loaded via oxlint jsPlugins) spawns esbuild
      # to bundle the Panda config. The default kernel overcommit heuristic
      # refuses fork() when the parent has a large virtual memory reservation,
      # causing "spawn ENOMEM" even with plenty of free RAM.
      # See: https://github.com/nodejs/node/issues/25382
      - name: Allow memory overcommit
        run: sudo sysctl -w vm.overcommit_memory=1
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
      - run: npm install
      - run: npm run lint
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
      - run: npm install
      - run: npm run check
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
  deploy:
    needs: [build, lint, check]

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
