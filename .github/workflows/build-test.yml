name: build-test
run-name: Test and Build
on:
  push:
    branches-ignore:
      - master
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure swap
        uses: actionhippie/swap@v1
        with:
          size: 4G
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
      - run: npm install
      - run: npm run lint
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
      - run: npm install
      - run: npm run build
